<!DOCTYPE html>
<html>
<head>
    <title>ប្រព័ន្ធគ្រប់គ្រងការសន្សំ</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="appFrame" src="https://script.google.com/macros/s/AKfycbwV.../exec" allowfullscreen="true"></iframe>

    <script>
        // កូដសម្រាប់រង់ចាំស្តាប់ការបញ្ជាពី Google Apps Script ឱ្យប្តូរទំព័រ
        window.addEventListener("message", function(event) {
            if (event.data && event.data.action === "navigate") {
                // នៅពេល Google ប្រាប់ឱ្យប្តូរទំព័រ, GitHub នឹងប្តូរ Link នៅក្នុង iframe នេះ
                document.getElementById("appFrame").src = event.data.url;
            }
        });
    </script>

</body>
</html>
