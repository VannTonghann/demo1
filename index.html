<!DOCTYPE html>
<html>
<head>
    <title>ប្រព័ន្ធគ្រប់គ្រងការសន្សំ</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="appFrame" src="https://script.google.com/macros/s/AKfycbx2-am4TW2r-8u5fgiFusftfj5SQ5HR8oCdv1Ak118hVm9jLSuB5DDNS3lZ5dgQ4ryA5w/exec" allowfullscreen="true"></iframe>

    <script>
        // កូដនេះមានតួនាទីចាំទទួលសារពី Google Script ពេលមានគេចុច Menu
        window.addEventListener("message", function(event) {
            if (event.data && event.data.action === "navigate") {
                // ផ្លាស់ប្តូរ Link នៅក្នុង iframe ទៅតាម Form ដែលបានជ្រើសរើស
                document.getElementById("appFrame").src = event.data.url;
            }
        });
    </script>

</body>
</html>
