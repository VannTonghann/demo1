<!DOCTYPE html>
<html>
<head>
    <title>Embedded Content</title>
</head>
<body style="margin: 0; overflow: hidden;">
    <iframe 
        src="https://script.google.com/macros/s/AKfycbwgz34n3skq1Tw4gFqKX5yrwd01EWPpV4QcynkVCcGLOJJaLTLoHnJmx5Pp-uPPlrsMWw/exec"
        width="100%"
        height="100%"
        allowfullscreen="true"
        /* បន្ថែម sandbox នៅទីនេះ */
        sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
    </iframe>

    <script>
        // ចំណាំ៖ ការធ្វើ Fullscreen ភ្លាមៗពេល Load អាចនឹងត្រូវបាន Browser មួយចំនួនបិទ (Block)
        // ប្រសិនបើមិនមានការចុច (User Interaction) ពីអ្នកប្រើប្រាស់
        window.onload = function() {
            var iframe = document.querySelector('iframe');
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen().catch((err) => {
                    console.log("Fullscreen ត្រូវបានបដិសេធ៖ " + err.message);
                });
            }
        };
    </script>
</body>
</html>
