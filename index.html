<!DOCTYPE html>
<html>
<head>
    <title>កម្មវិធីគ្រប់គ្រងការសន្សំសិស្ស</title>
</head>
<body style="margin: 0; overflow: hidden;">
    <iframe src="https://script.google.com/macros/s/AKfycbwwxRCUpjfGPWeVKsjKpdv5DVanF5nRe_0CC3mpD1V9MXLbOmZ4diNEND2_Gzng8phz-g/exec"
        width="100%"
        height="100%"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;"
        sandbox="allow-forms allow-scripts allow-same-origin allow-popups"
        allowfullscreen="true">
</iframe>
    <script>
        // ចំណាំ៖ ការធ្វើ Fullscreen ភ្លាមៗពេល Load អាចនឹងត្រូវបាន Browser មួយចំនួនបិទ (Block)
        // ប្រសិនបើមិនមានការចុច (User Interaction) ពីអ្នកប្រើប្រាស់
        window.onload = function() {
            var iframe = document.querySelector('iframe');
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen().catch((err) => {
                    console.log("Fullscreen ត្រូវបានបដិសេធ៖ " + err.message);
                });
            }
        };
    </script>
</body>
</html>
